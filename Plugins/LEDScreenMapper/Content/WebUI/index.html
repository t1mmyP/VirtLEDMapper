<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LED Screen Mapper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <span class="toolbar-title">LED Screen Mapper</span>
    <div class="toolbar-group">
      <label class="toolbar-label">Map Resolution</label>
      <input type="number" id="mapWidth"  value="3840" min="1" title="Pixel Map Width">
      <span class="toolbar-sep">×</span>
      <input type="number" id="mapHeight" value="2160" min="1" title="Pixel Map Height">
      <button id="btnLoadMap" title="Load pixel map image from URL provided by UE">Load Map</button>
    </div>
    <div class="toolbar-group">
<input type="text" id="saveNameInput" placeholder="Config name…" style="width:110px;">
      <button id="btnSave">Save</button>
      <button id="btnLoad">Load…</button>
      <button id="btnExport"    class="btn-success">Export JSON</button>
    </div>
    <div class="toolbar-group">
      <label class="toolbar-label">Snap (px)</label>
      <input type="number" id="snapGrid" value="1" min="1" max="512" style="width:54px;" title="Grid snap size in pixels (1 = off)">
    </div>
    <div class="toolbar-group">
      <label class="toolbar-label">Zoom</label>
      <button id="btnZoomIn">+</button>
      <button id="btnZoomReset">1:1</button>
      <button id="btnZoomOut">−</button>
      <button id="btnZoomFit">Fit</button>
    </div>
  </div>

  <div id="main-layout">

    <!-- SIDEBAR -->
    <div id="sidebar">

      <!-- Add Screen Panel -->
      <div class="panel" id="addScreenPanel">
        <div class="panel-title">New Screen</div>
        <div class="field-row">
          <label>Name</label>
          <input type="text" id="newScreenName" value="Screen_00" />
        </div>
        <div class="field-row">
          <label>W (px)</label>
          <input type="number" id="newW" value="384" min="1" />
        </div>
        <div class="field-row">
          <label>H (px)</label>
          <input type="number" id="newH" value="680" min="1" />
        </div>
        <div class="field-row">
          <label>Index</label>
          <input type="number" id="newIndex" value="0" min="0" />
        </div>
        <button id="btnConfirmAdd" class="btn-primary" style="width:100%; margin-top:6px;">Place on Map</button>
      </div>

      <!-- Screen List -->
      <div class="panel" id="screenListPanel">
        <div class="panel-title">Screens <span id="screenCount">(0)</span></div>
        <div id="screenList"></div>
      </div>

      <!-- Selected Screen Properties -->
      <div class="panel" id="propsPanel" style="display:none;">
        <div class="panel-title">Properties</div>
        <div class="field-row"><label>Name</label>   <input type="text"   id="propName"   /></div>
        <div class="field-row"><label>Index</label>  <input type="number" id="propIndex"  /></div>
        <div class="field-row"><label>X (px)</label> <input type="number" id="propX"      /></div>
        <div class="field-row"><label>Y (px)</label> <input type="number" id="propY"      /></div>
        <div class="field-row"><label>W (px)</label> <input type="number" id="propW"      /></div>
        <div class="field-row"><label>H (px)</label> <input type="number" id="propH"      /></div>
        <div class="uv-display">
          <div class="panel-title" style="margin-top:8px;">UV Coordinates</div>
          <div class="field-row"><label>Offset X</label><span id="uvOffsetX">—</span></div>
          <div class="field-row"><label>Offset Y</label><span id="uvOffsetY">—</span></div>
          <div class="field-row"><label>Scale X</label> <span id="uvScaleX">—</span></div>
          <div class="field-row"><label>Scale Y</label> <span id="uvScaleY">—</span></div>
        </div>
        <div style="display:flex; gap:4px; margin-top:8px;">
          <button id="btnDuplicateScreen" style="flex:1;">Duplicate</button>
          <button id="btnDeleteScreen" class="btn-danger" style="flex:1;">Delete</button>
        </div>
      </div>

    </div>

    <!-- CANVAS AREA -->
    <div id="canvasContainer">
      <canvas id="mapCanvas"></canvas>
      <div id="canvasHint">Load a pixel map or use <b>UE → initMap()</b> to get started</div>
    </div>

  </div>

  <!-- Load Project Modal -->
  <div id="loadModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#252525; border:1px solid #444; border-radius:6px; padding:16px; min-width:260px; max-width:360px;">
      <div style="font-weight:600; margin-bottom:10px; color:#fff;">Load Config</div>
      <div id="loadModalList" style="display:flex; flex-direction:column; gap:4px; max-height:300px; overflow-y:auto; margin-bottom:12px;"></div>
      <button id="loadModalClose" style="width:100%;">Cancel</button>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
